name: Build, Push and GitOps Update

on:
  push:
    branches:
      - main

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }} ./app

      - name: Push Docker Image
        run: |
          docker push liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Kubernetes deployment.yaml
        env:
          SHA_SHORT: ${{ steps.vars.outputs.SHA_SHORT }}
        run: |
          echo "Updating manifest with SHA: $SHA_SHORT"

          yq -i '.spec.template.spec.containers[0].image = "liiamj234/cicd-k8s:" + strenv(SHA_SHORT)' k8s/deployment.yaml

          yq -i '.spec.template.spec.containers[0].env = [{"name":"APP_VERSION","value": strenv(SHA_SHORT)}]' k8s/deployment.yaml

      - name: Commit and Push Updated Manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "GitOps: bump image + APP_VERSION to ${{ steps.vars.outputs.SHA_SHORT }}" || echo "No changes to commit"
          git push