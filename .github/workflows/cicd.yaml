name: Build, Push and Update Manifest

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Git SHA
        id: vars
        run: echo "SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }} ./app

      - name: Push Docker Image
        run: |
          docker push liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }}

      - name: Update Kubernetes Manifest
        run: |
          SHA=${{ steps.vars.outputs.SHA_SHORT }}
          sed -i "s|image: liiamj234/cicd-k8s:.*|image: liiamj234/cicd-k8s:$SHA|" k8s/deployment.yaml
          sed -i "/name: APP_VERSION/{n;s|value: .*|value: \"$SHA\"|}" k8s/deployment.yaml

      - name: Commit and Push Updated Manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image and APP_VERSION to ${{ steps.vars.outputs.SHA_SHORT }}" || echo "No changes to commit"
          git push