name: Build, Push and GitOps Update

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }} ./app

      - name: Push image
        run: |
          docker push liiamj234/cicd-k8s:${{ steps.vars.outputs.SHA_SHORT }}

      - name: Install yq (YAML editor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tag + APP_VERSION in deployment.yaml
        run: |
          SHA=${{ steps.vars.outputs.SHA_SHORT }}
          yq -i '.spec.template.spec.containers[0].image = "liiamj234/cicd-k8s:" + strenv(SHA)' k8s/deployment.yaml
          yq -i '.spec.template.spec.containers[0].env |= (map(select(.name != "APP_VERSION")) + [{"name":"APP_VERSION","value": strenv(SHA)}])' k8s/deployment.yaml

      - name: Commit & push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "GitOps: bump image + APP_VERSION to ${{ steps.vars.outputs.SHA_SHORT }}" || echo "No changes to commit"
          git push